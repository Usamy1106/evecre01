
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planner - イベント作りをサポート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --create-yellow: #FFC300;
            --create-green: #9EDF05;
            --create-blue: #0CA1E3;
            --create-red: #EE3E12;
            --primary-black: #484545;
            --white: #FFFFFF;
            --gray: #A7AAAC;
            --text-placeholder: #9A928F;
            --button-secondary: #EBE8E5;
            --button-tertiary: #9F998F;
            --bg-base: #FDFBF8;
            --bg-surface: #FFFFFF;
            --bg-textbox: #E1DFDC;
            --border-primary: #D3D6D8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-base);
            color: var(--primary-black);
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        .heading-l { font-size: 20px; font-weight: 600; }
        .heading-m { font-size: 18px; font-weight: 600; }
        .heading-r { font-size: 16px; font-weight: 600; }
        .heading-rs { font-size: 14px; font-weight: 600; }

        .text-m { font-size: 18px; font-weight: 500; }
        .text-r { font-size: 16px; font-weight: 400; }
        .text-rs { font-size: 14px; font-weight: 400; }

        .input-field {
            background-color: var(--bg-textbox);
            border: none;
            border-radius: 12px;
            color: var(--primary-black);
            font-size: 16px;
        }

        .input-field::placeholder {
            color: var(--text-placeholder);
        }

        .btn-primary {
            background-color: var(--create-blue);
            color: var(--white);
            border-radius: 12px;
            transition: opacity 0.2s;
        }

        .btn-primary:disabled {
            opacity: 0.5;
        }

        .btn-secondary {
            background-color: var(--white);
            color: var(--primary-black);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
        }

        .page-transition {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen relative flex flex-col">
        <!-- index.jsによってコンテンツが注入されます -->
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
